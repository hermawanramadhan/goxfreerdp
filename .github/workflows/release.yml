name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev pkg-config gcc

      - name: Build
        run: |
          go build -ldflags "-X 'goxfreerdp/internal/ui.Version=${{ github.ref_name }}'" -o goxfreerdp-linux-amd64 cmd/goxfreerdp/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goxfreerdp-linux-amd64
          path: goxfreerdp-linux-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev pkg-config gcc

      - name: Build
        run: |
          go build -ldflags "-X 'goxfreerdp/internal/ui.Version=${{ github.ref_name }}'" -o goxfreerdp-linux-arm64 cmd/goxfreerdp/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goxfreerdp-linux-arm64
          path: goxfreerdp-linux-arm64

  create-release:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: goxfreerdp-linux-amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: goxfreerdp-linux-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            goxfreerdp-linux-amd64
            goxfreerdp-linux-arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
